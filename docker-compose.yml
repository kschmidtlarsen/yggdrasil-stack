  # Umami - Web Analytics (Google Analytics alternative)
  # Port: 6105
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: yggdrasil-umami
    restart: unless-stopped
    ports:
      - "6105:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-urd}:${POSTGRES_PASSWORD}@urd:5432/umami_db
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-umami-secret-change-me}
      DISABLE_UPDATES: "true"
    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────────────────────
  # WATCHTOWER - Automatic Container Updates & Image Cleanup
  # ─────────────────────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: yggdrasil-watchtower
    restart: unless-stopped
    environment:
      # Only update containers with the watchtower.enable=true label
      WATCHTOWER_LABEL_ENABLE: "true"
      # Remove old images after updating (prevents orphaned images)
      WATCHTOWER_CLEANUP: "true"
      # Check for updates every 5 minutes (300 seconds)
      WATCHTOWER_POLL_INTERVAL: 300
      # Include stopped containers
      WATCHTOWER_INCLUDE_STOPPED: "true"
      # Revive stopped containers after update
      WATCHTOWER_REVIVE_STOPPED: "true"
      # Rolling restarts (one container at a time)
      WATCHTOWER_ROLLING_RESTART: "true"
      # Log level
      WATCHTOWER_DEBUG: "false"
      # ghcr.io authentication (GitHub Container Registry)
      REPO_USER: ${GITHUB_USER:-kschmidtlarsen}
      REPO_PASS: ${GITHUB_TOKEN}
    volumes:
      # Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --label-enable
    networks:
      - bifrost
