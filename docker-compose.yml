      retries: 3
      start_period: 30s
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Sorring 3D - 3D Print Service
  sorring3d:
    image: ghcr.io/kschmidtlarsen/sorring3d:latest
    container_name: yggdrasil-sorring3d
    restart: unless-stopped
