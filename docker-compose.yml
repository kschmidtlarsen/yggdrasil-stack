# ═══════════════════════════════════════════════════════════════════════════════
#                              YGGDRASIL - The World Tree
#                         Unified Self-Hosted Platform Stack
# ═══════════════════════════════════════════════════════════════════════════════
#
# Norse mythology: Yggdrasil is the immense cosmic tree that connects the nine
# worlds, serving as the center of the universe in Norse cosmology.
#
# This stack unifies all platform services under one deployment:
# - Urd (PostgreSQL) - Database
# - Mimir - AI Agent Orchestration
# - Application Services (pre-built images from ghcr.io)
#
# Direct routing: Each app exposes its own port for Cloudflare Tunnel.
# Managed via Portainer on Unraid (192.168.0.20)
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  bifrost:
    name: bifrost
    driver: bridge

volumes:
  # Infrastructure
  urd-data:
    name: yggdrasil-urd-data
  pgadmin-data:
    name: yggdrasil-pgadmin-data

  # File uploads
  sorring3d-uploads:
    name: yggdrasil-sorring3d-uploads
  sorring-udlejning-uploads:
    name: yggdrasil-sorring-udlejning-uploads

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # URD - PostgreSQL 17 Database (Well of Fate)
  # ─────────────────────────────────────────────────────────────────────────────
  urd:
    image: postgres:17-alpine
    container_name: yggdrasil-urd
    restart: unless-stopped
    ports:
      - "5439:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-urd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - urd-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
      - /mnt/user/websites/urd/imports:/imports:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-urd} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────────────────────
  # PGADMIN - Database Administration
  # ─────────────────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: yggdrasil-pgadmin
    restart: unless-stopped
    ports:
      - "6104:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@exe.pm}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - urd
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────────────────────
  # MIMIR - AI Agent Orchestration (The Wise One)
  # Port: 6103
  # ─────────────────────────────────────────────────────────────────────────────
  mimir:
    image: ghcr.io/kschmidtlarsen/mimir:latest
    container_name: yggdrasil-mimir
    restart: unless-stopped
    ports:
      - "6103:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-urd}:${POSTGRES_PASSWORD}@urd:5432/mimir_db?sslmode=disable
      CLAUDE_CONFIG_DIR: /config/home/.claude
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      ENCRYPTION_SECRET: ${MIMIR_ENCRYPTION_SECRET:-mimir-default-encryption-secret}
      INTERNAL_API_TOKEN: ${MIMIR_INTERNAL_API_TOKEN:-mimir-internal-token}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    volumes:
      - /mnt/user/websites:/data/websites:rw
      - /mnt/user/appdata/claude:/config/home/.claude:ro
    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────────────────────
  # APPLICATION SERVICES (pre-built images from ghcr.io)
  # Each app has its own port for direct Cloudflare Tunnel routing
  # ─────────────────────────────────────────────────────────────────────────────

