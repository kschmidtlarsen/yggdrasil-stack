    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Night Tales - AI Bedtime Story Generator
  # Port: 6206
  nighttales:
    image: ghcr.io/kschmidtlarsen/nighttales:latest
    container_name: yggdrasil-nighttales
    restart: unless-stopped
    ports:
      - "6206:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - /mnt/user/appdata/claude/.env:/app/.env:ro
    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Schmidt Larsen - Professional Personal Website
  # Port: 6207
  schmidt-larsen:
    image: ghcr.io/kschmidtlarsen/schmidt-larsen:latest
    container_name: yggdrasil-schmidt-larsen
    restart: unless-stopped
    ports:
      - "6207:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Playwright - E2E Test Dashboard
  # Port: 6102
  playwright:
    image: ghcr.io/kschmidtlarsen/playwright:latest
    container_name: yggdrasil-playwright
    restart: unless-stopped
    ports:
      - "6102:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - /mnt/user/appdata/claude/.env:/app/.env:ro
    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Sorring 3D - 3D Print Service
  # Port: 6203
  sorring3d:
    image: ghcr.io/kschmidtlarsen/sorring3d:latest
    container_name: yggdrasil-sorring3d
    restart: unless-stopped
    ports:
      - "6203:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - /mnt/user/appdata/claude/.env:/app/.env:ro
      - sorring3d-uploads:/app/uploads
    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Sorring Udlejning - Tool Rental Platform
  # Port: 6204
  sorring-udlejning:
    image: ghcr.io/kschmidtlarsen/sorring-udlejning:latest
    container_name: yggdrasil-sorring-udlejning
    restart: unless-stopped
    ports:
