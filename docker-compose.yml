# ═══════════════════════════════════════════════════════════════════════════════
#                              YGGDRASIL - The World Tree
#                          Infrastructure Stack (Core Services)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Norse mythology: Yggdrasil is the immense cosmic tree that connects the nine
# worlds, serving as the center of the universe in Norse cosmology.
#
# This stack contains ONLY infrastructure and platform services:
# - Urd (PostgreSQL) — Database
# - Yggdrasil Dashboard — Infrastructure operations platform
# - Eir — Backup & recovery guardian
# - Ollama — Local AI inference
# - Browser — Firefox + noVNC for OAuth flows
# - Watchtower — Automatic container updates
#
# Application services (Kanban, Mimir, Calify, etc.) run as independent
# stacks in their own repos, joining via the Bifrost network.
#
# Direct routing: Each app exposes its own port for Cloudflare Tunnel.
# Managed via Portainer on Unraid (192.168.0.20)
#
# SECRET MANAGEMENT:
# All secrets live in /mnt/user/appdata/claude/.env (single source of truth).
# Each app container mounts this file as /app/.env:ro and loads it via dotenv.
# No secrets in this compose file or in Portainer stack env vars.
# Only infrastructure services (urd, watchtower) use
# Portainer stack env vars for compose-level interpolation.
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  bifrost:
    name: bifrost
    driver: bridge

volumes:
  # Infrastructure
  urd-data:
    name: yggdrasil-urd-data
  ollama-models:
    name: yggdrasil-ollama-models

  # File uploads: bind-mounted from /mnt/user/websites/files/{project}
  # No named volumes — files live on the Unraid share for easy backup

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # URD - PostgreSQL 17 Database (Well of Fate)
  # ─────────────────────────────────────────────────────────────────────────────
  urd:
    image: pgvector/pgvector:pg17
    container_name: yggdrasil-urd
    restart: unless-stopped
    ports:
      - "5439:5432"
    # Postgres image reads POSTGRES_PASSWORD from container env at startup,
    # which would normally require either compose-time interpolation (needs
    # Portainer-level env vars — we don't use those) or env_file (read by
    # Portainer's compose runner, which can't see /mnt/user/appdata/claude/).
    # POSTGRES_PASSWORD_FILE works because the bind mount is resolved by the
    # Docker daemon directly — same pattern every other service uses for the
    # central secrets file. The password file is a single-line file at
    # /mnt/user/appdata/claude/postgres-password.
    environment:
      POSTGRES_USER: urd
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - urd-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
      - /mnt/user/websites/urd/imports:/imports:ro
      - /mnt/user/appdata/claude/postgres-password:/run/secrets/postgres-password:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urd -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────────────────────
  # YGGDRASIL - Infrastructure Operations Platform
  # Port: 6100
  # ─────────────────────────────────────────────────────────────────────────────
  yggdrasil:
    image: ghcr.io/kschmidtlarsen/yggdrasil:latest
    container_name: yggdrasil-dashboard
    restart: unless-stopped
    ports:
      - "6100:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      CLAUDE_CONFIG_DIR: /config/home/.claude
    volumes:
      - /mnt/user/appdata/claude/.env:/app/.env:ro
      - /mnt/user/websites:/data/websites:rw
      - /mnt/user/appdata/claude:/config/home/.claude:ro
    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────────────────────
  # BROWSER - Firefox + noVNC for OAuth flows
  # Port: 6111 (noVNC web UI)
  # Used to complete browser-based OAuth for remote MCP servers
  # ─────────────────────────────────────────────────────────────────────────────
  browser:
    image: jlesage/firefox:latest
    container_name: yggdrasil-browser
    restart: unless-stopped
    ports:
      - "6111:5800"
    environment:
      DISPLAY_WIDTH: 1280
      DISPLAY_HEIGHT: 900
      KEEP_APP_RUNNING: 1
      FF_PREF_BROWSER_TABS_REMOTE_AUTOSTART: "\"true\""
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # ─────────────────────────────────────────────────────────────────────────────
  # EIR - Backup & Recovery Guardian (Goddess of Healing)
  # Port: 6108
  # ─────────────────────────────────────────────────────────────────────────────
  eir:
    image: ghcr.io/kschmidtlarsen/eir:latest
    container_name: yggdrasil-eir
    restart: unless-stopped
    ports:
      - "6108:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      URD_HOST: urd
      URD_PORT: 5432
      BACKUP_SCHEDULE: "0 3,15 * * *"
      BACKUP_CAP_GB: 100
    volumes:
      - /mnt/user/appdata/claude/.env:/app/.env:ro
      - /mnt/user/appdata/claude/.env:/config/.env:ro
      - /mnt/user/backup/websites:/backups
      - /mnt/user/websites/files/sorring3d:/volumes/sorring3d:ro
      - /mnt/user/websites/files/sorring-udlejning:/volumes/sorring-udlejning:ro
      - /mnt/user/websites/files/stuffbase:/volumes/stuffbase:ro
      - /mnt/user/websites/yggdrasil-stack/docker-compose.yml:/config/docker-compose.yml:ro
      - /mnt/user/websites/yggdrasil-stack/init:/config/init:ro
    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────────────────────
  # OLLAMA - Local AI Inference (Embeddings & Local Models)
  # Port: 6109 (internal only, no external mapping needed)
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: yggdrasil-ollama
    restart: unless-stopped
    ports:
      - "6109:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      # GPU passthrough — Unraid Nvidia plugin is installed on the host, so
      # the nvidia-container-runtime is wired into Docker. NVIDIA_VISIBLE_DEVICES
      # =all picks every Nvidia card; capabilities=all unlocks compute + utility
      # which CUDA + cuBLAS need. The reservations clause below is what actually
      # requests the device in Compose v3.
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      # Keep loaded models in VRAM indefinitely — otherwise ollama unloads after
      # 5 min of idleness and the next request pays a 5-10s reload tax PLUS
      # blows the OpenAI SDK's 3-retry timeout. Tradeoff: 8B-Q4 hermes3 parks
      # ~5GB of VRAM permanently. Acceptable for a personal assistant.
      OLLAMA_KEEP_ALIVE: "-1"
      # Default num_ctx for hermes3 is 4096 — Hermes' bundled system prompt
      # alone exceeds that and we saw "API call failed after 3 retries: Request
      # timed out". Bump to 32K so prompts don't truncate. Hermes docs say 64K
      # minimum; 32K fits most agent workflows and keeps VRAM use lower. Raise
      # to 65536 if context-limit errors appear in agent.log.
      OLLAMA_NUM_CTX: "32768"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          # 12G (was 8G) — model-swap workspace needs headroom: loading a new
          # 8B model while another is still being unloaded briefly consumes
          # 2× the model size in system RAM, plus KV cache. With 8G we hit
          # OOM during the hermes3→llama3-groq-tool-use swap.
          memory: 12G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # ─────────────────────────────────────────────────────────────────────────────
  # DESIGN SYSTEM — "Graphite Iris" shared CSS/tokens for every *.exe.pm app
  # Port: 6110 | Domain: design.exe.pm (PUBLIC — no Cloudflare Access, so public
  # sites can load it too). Own repo/image/CI (kschmidtlarsen/design-system);
  # Watchtower updates ONLY this container when a new image lands, so editing the
  # design never redeploys the infra stack / Urd.
  # ─────────────────────────────────────────────────────────────────────────────
  design:
    image: ghcr.io/kschmidtlarsen/design-system:latest
    container_name: yggdrasil-design
    restart: unless-stopped
    ports:
      - "6110:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/latest/iris.css"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────────────────────
  # WATCHTOWER - Automatic Container Updates & Image Cleanup
  # ─────────────────────────────────────────────────────────────────────────────
  # NOTE: Switched from containrrr/watchtower (unmaintained, last release 2023-11)
  # to nickfedor/watchtower fork on 2026-05-05. The original ships an old Docker
  # SDK (client API v1.25) that current Docker daemons (which require v1.40+)
  # reject — Watchtower then crash-loops with "client version 1.25 is too old".
  # nickfedor/watchtower is a drop-in replacement that tracks modern Docker APIs.
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: yggdrasil-watchtower
    restart: unless-stopped
    ports:
      # HTTP API for Homepage's watchtower widget. Internal :8080 is
      # watchtower's default; host :8088 avoids the SABnzbd collision on 8080.
      # Homepage is on the bridge network (not bifrost), so the API has to be
      # reachable on the host IP. Token below is the auth.
      - "8088:8080"
    environment:
      # Only update containers with the watchtower.enable=true label
      WATCHTOWER_LABEL_ENABLE: "true"
      # Remove old images after updating (prevents orphaned images)
      WATCHTOWER_CLEANUP: "true"
      # Check for updates every 1 minute (60 seconds)
      WATCHTOWER_POLL_INTERVAL: 60
      # Include stopped containers
      WATCHTOWER_INCLUDE_STOPPED: "true"
      # Revive stopped containers after update
      WATCHTOWER_REVIVE_STOPPED: "true"
      # HTTP API for Homepage widget — token injected via Portainer stack env
      # (see CLAUDE.md: infra services may use stack env vars for interpolation).
      WATCHTOWER_HTTP_API_METRICS: "true"
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_HTTP_API_TOKEN}
      # Rolling restart removed: nickfedor/watchtower validates rolling-restart
      # compatibility and refuses to update any container that has depends_on
      # links (e.g. yggdrasil-dashboard depends_on yggdrasil-urd). Sequential
      # stop+pull+start (the default) is fine for this single-replica setup.
      # Log level
      WATCHTOWER_DEBUG: "false"
    volumes:
      # Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # ghcr.io registry credentials (generated outside git, see .gitignore)
      - /mnt/user/websites/yggdrasil-stack/watchtower-config.json:/config.json:ro
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - bifrost
