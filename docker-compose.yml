    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Grablist - Smart Shopping List PWA
  # Port: 6205
  grablist:
    image: ghcr.io/kschmidtlarsen/grablist:latest
    container_name: yggdrasil-grablist
    restart: unless-stopped
    ports:
      - "6205:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
