# ═══════════════════════════════════════════════════════════════════════════════
#                              YGGDRASIL - The World Tree
#                         Unified Self-Hosted Platform Stack
# ═══════════════════════════════════════════════════════════════════════════════
#
# Norse mythology: Yggdrasil is the immense cosmic tree that connects the nine
# worlds, serving as the center of the universe in Norse cosmology.
#
# This stack unifies all platform services under one deployment:
# - Urd (PostgreSQL) - Database
# - Mimir - AI Agent Orchestration
# - Application Services (pre-built images from ghcr.io)
#
# Direct routing: Each app exposes its own port for Cloudflare Tunnel.
# Managed via Portainer on Unraid (192.168.0.20)
#
# SECRET MANAGEMENT:
# All secrets live in /mnt/user/appdata/claude/.env (single source of truth).
# Each app container mounts this file as /app/.env:ro and loads it via dotenv.
# No secrets in this compose file or in Portainer stack env vars.
# Only infrastructure services (urd, pgadmin, umami, watchtower) use
# Portainer stack env vars for compose-level interpolation.
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  bifrost:
    name: bifrost
    driver: bridge

volumes:
  # Infrastructure
  urd-data:
    name: yggdrasil-urd-data
  pgadmin-data:
    name: yggdrasil-pgadmin-data
  ollama-models:
    name: yggdrasil-ollama-models

  # File uploads
  sorring3d-uploads:
    name: yggdrasil-sorring3d-uploads
  sorring-udlejning-uploads:
    name: yggdrasil-sorring-udlejning-uploads

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # URD - PostgreSQL 17 Database (Well of Fate)
  # ─────────────────────────────────────────────────────────────────────────────
  urd:
    image: pgvector/pgvector:pg17
    container_name: yggdrasil-urd
    restart: unless-stopped
    ports:
      - "5439:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-urd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - urd-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
      - /mnt/user/websites/urd/imports:/imports:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-urd} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────────────────────
  # PGADMIN - Database Administration
  # ─────────────────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: yggdrasil-pgadmin
    restart: unless-stopped
    ports:
      - "6104:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@exe.pm}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - urd
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────────────────────
  # MIMIR - AI Agent Orchestration (The Wise One)
  # Port: 6103
  # ─────────────────────────────────────────────────────────────────────────────
  mimir:
    image: ghcr.io/kschmidtlarsen/mimir:latest
    container_name: yggdrasil-mimir
    restart: unless-stopped
    ports:
      - "6103:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      CLAUDE_CONFIG_DIR: /config/home/.claude
    volumes:
      - /mnt/user/appdata/claude/.env:/app/.env:ro
      - /mnt/user/websites:/data/websites:rw
      - /mnt/user/appdata/claude:/config/home/.claude:ro
    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────────────────────
  # YGGDRASIL FRONTEND - Infrastructure Operations Platform
  # Port: 6100
  # ─────────────────────────────────────────────────────────────────────────────
  yggdrasil-frontend:
    image: ghcr.io/kschmidtlarsen/yggdrasil-frontend:latest
    container_name: yggdrasil-yggdrasil-frontend
    restart: unless-stopped
    ports:
      - "6100:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      CLAUDE_CONFIG_DIR: /config/home/.claude
    volumes:
      - /mnt/user/appdata/claude/.env:/app/.env:ro
      - /mnt/user/websites:/data/websites:rw
      - /mnt/user/appdata/claude:/config/home/.claude:ro
    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────────────────────
  # CHROME - Headless Browser for DevTools MCP
  # Port: 6107 (CDP exposed for chrome-devtools-mcp)
  # ─────────────────────────────────────────────────────────────────────────────
  chrome:
    image: zenika/alpine-chrome:latest
    container_name: yggdrasil-chrome
    restart: unless-stopped
    ports:
      - "6107:9222"
    command:
      - "--no-sandbox"
      - "--remote-debugging-address=0.0.0.0"
      - "--remote-debugging-port=9222"
      - "--disable-gpu"
      - "--disable-dev-shm-usage"
      - "--headless"
      - "about:blank"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9222/json/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # ─────────────────────────────────────────────────────────────────────────────
  # EIR - Backup & Recovery Guardian (Goddess of Healing)
  # Port: 6108
  # ─────────────────────────────────────────────────────────────────────────────
  eir:
    image: ghcr.io/kschmidtlarsen/eir:latest
    container_name: yggdrasil-eir
    restart: unless-stopped
    ports:
      - "6108:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      URD_HOST: urd
      URD_PORT: 5432
      BACKUP_SCHEDULE: "0 3,15 * * *"
      BACKUP_CAP_GB: 100
    volumes:
      - /mnt/user/appdata/claude/.env:/app/.env:ro
      - /mnt/user/appdata/claude/.env:/config/.env:ro
      - /mnt/user/backup/websites:/backups
      - sorring3d-uploads:/volumes/sorring3d:ro
      - sorring-udlejning-uploads:/volumes/sorring-udlejning:ro
      - /mnt/user/websites/yggdrasil/docker-compose.yml:/config/docker-compose.yml:ro
    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────────────────────
  # OLLAMA - Local AI Inference (Embeddings & Local Models)
  # Port: 6109 (internal only, no external mapping needed)
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: yggdrasil-ollama
    restart: unless-stopped
    ports:
      - "6109:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # ─────────────────────────────────────────────────────────────────────────────
  # APPLICATION SERVICES (pre-built images from ghcr.io)
  # Each app mounts /mnt/user/appdata/claude/.env as /app/.env:ro
  # and loads secrets via dotenv at startup. No secrets in compose.
  # ─────────────────────────────────────────────────────────────────────────────

  # Kanban Board - Project Management
  # Port: 6101
  kanban:
    image: ghcr.io/kschmidtlarsen/kanban:latest
    container_name: yggdrasil-kanban
    restart: unless-stopped
    ports:
      - "6101:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - /mnt/user/appdata/claude/.env:/app/.env:ro
    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Calify - Calendar Feed Transformation
  # Port: 6201
  calify:
    image: ghcr.io/kschmidtlarsen/calify:latest
