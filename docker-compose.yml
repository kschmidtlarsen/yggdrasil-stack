    depends_on:
      urd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - bifrost
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Calify - Calendar Feed Transformation
  calify:
